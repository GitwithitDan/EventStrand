<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost? — EventStrand</title>
  <meta name="description" content="Never miss what's on at the places you love.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
  <style>
    :root {
      --bg:           #04061a;
      --bg2:          #07091f;
      --surface:      #10163a;
      --border2:      rgba(100,120,255,0.22);
      --primary:      #6C8FFF;
      --primary-glow: rgba(108,143,255,0.22);
      --violet:       #B06FFF;
      --green:        #11DBA6;
      --text:         #ECF0FF;
      --text-dim:     #8290C0;
      --text-faint:   #454A72;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* ── Background layers ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 55% at 70% 20%, rgba(108,143,255,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 45% 45% at 15% 75%, rgba(176,111,255,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 85% 85%, rgba(17,219,166,0.10) 0%, transparent 65%);
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.035;
      background-image:
        linear-gradient(var(--border2) 1px, transparent 1px),
        linear-gradient(90deg, var(--border2) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Main content ── */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px 24px;
      text-align: center;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 64px;
      text-decoration: none;
      opacity: 0;
      animation: fadeUp 0.5s 0.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .logo-img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: cover;
    }

    .logo-text {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    /* ── 404 numeral ── */
    .numeral {
      font-family: 'Fraunces', serif;
      font-size: clamp(100px, 20vw, 160px);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -6px;
      color: transparent;
      background: linear-gradient(135deg, var(--primary) 0%, var(--violet) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      position: relative;
    }

    .numeral::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--violet));
      border-radius: 2px;
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Fraunces', serif;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 400;
      color: var(--text);
      margin-top: 28px;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .headline em {
      font-style: italic;
      color: var(--primary);
    }

    .sub {
      font-size: 16px;
      color: var(--text-dim);
      max-width: 380px;
      line-height: 1.7;
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      border: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #8aaeff;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--primary-glow);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border2);
    }

    .btn-ghost:hover {
      color: var(--text);
      background: var(--surface);
    }

    /* ── Decorative dots ── */
    .dot-ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(108,143,255,0.08);
      pointer-events: none;
    }

    .dot-ring:nth-child(1) { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .dot-ring:nth-child(2) { width: 750px; height: 750px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .dot-ring:nth-child(3) { width: 1000px; height: 1000px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="dot-ring"></div>
  <div class="dot-ring"></div>
  <div class="dot-ring"></div>

  <div class="stage">

    <a href="/" class="logo">
      <img src="/icon-192.png" alt="EventStrand" class="logo-img">
      <span class="logo-text">EventStrand</span>
    </a>

    <div class="numeral">404</div>

    <h1 class="headline">This strand has <em>gone quiet</em></h1>

    <p class="sub">
      The page you're looking for doesn't exist or may have moved.
      Head back to find strands worth following.
    </p>

    <div class="actions">
      <a href="/" class="btn btn-primary">← Back to EventStrand</a>
    </div>

  </div>

  <script>
    // GitHub Pages deep-link redirect shim.
    // For known app paths, silently redirect to the hash-routed SPA.
    // For anything else, show this page as a proper 404.
    (function () {
      var path   = window.location.pathname;
      var search = window.location.search;
      var APP_PREFIXES = ['/s/', '/b/', '/p/'];
      var isAppPath = APP_PREFIXES.some(function (prefix) {
        return path.startsWith(prefix);
      });
      if (isAppPath) {
        window.location.replace(
          window.location.origin + '/#' + path + search
        );
      }
      // Otherwise: stay on this page and let the user navigate home
    }());
  </script>

</body>
</html>
